
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kebun Tabunganku</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fffaf0;
        }
        .bouncy {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bouncy:active {
            transform: scale(0.95);
        }
        .flower-spin {
            animation: spin 10s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Print styles */
        @media print {
            body {
                background-color: #fff; /* White background for print */
                margin: 0;
                padding: 0;
            }
            #root > div > header, /* Hide header */
            #root > div > nav,    /* Hide bottom navigation */
            #root > div > .fixed.inset-0.pointer-events-none, /* Hide flower decorations */
            #print-button,        /* Hide print button itself */
            .no-print             /* Custom class to hide other non-report elements */
             {
                display: none !important;
            }
            main {
                max-width: none !important; /* Allow reports to take full width */
                margin: 0 !important;
                padding: 20px !important; /* Add some padding for paper margins */
                min-height: auto !important; /* Adjust height */
            }
            .report-card {
                box-shadow: none !important; /* Remove shadows for print */
                border: 1px solid #eee !important; /* Add light border for separation */
                page-break-inside: avoid; /* Avoid breaking reports across pages */
                margin-bottom: 20px; /* Space between reports */
            }
            h1, h2, h3 {
                color: #333 !important; /* Darker text for readability */
            }
            .text-green-500, .text-red-400, .text-blue-600, .text-purple-600 {
                color: #333 !important; /* Ensure colored text is dark for print */
            }
            .report-table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 15px;
            }
            .report-table th, .report-table td {
                border: 1px solid #ccc;
                padding: 8px;
                text-align: left;
            }
            .report-table th {
                background-color: #f2f2f2;
                font-weight: bold;
            }
        }
    </style>
<script type="importmap">

    "recharts": "https://esm.sh/recharts@^3.7.0"
  }
}
</script>
</head>

</body>
</html>
